<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Core Human Meet | PhD Work Psychology</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #meet-frame { width: 75%; height: 100vh; border: none; }
        #sidebar { width: 25%; background: #111; padding: 20px; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-rec { background: #ff4b2b; color: white; }
        .btn-stop { background: #444; color: white; display: none; }
        h2 { font-size: 16px; color: #00d2ff; }
        p { font-size: 11px; color: #888; }
    </style>
</head>
<body>

    <iframe 
        id="meet-frame" 
        src="https://meet.jit.si/CoreHumanAI_Sesion_PhD" 
        allow="camera; microphone; display-capture; autoplay; clipboard-write"
    ></iframe>

    <div id="sidebar">
        <h2>Control de Sesión</h2>
        <button id="btnStart" class="btn btn-rec">🔴 INICIAR GRABACIÓN</button>
        <button id="btnStop" class="btn btn-stop">💾 DESCARGAR VIDEO</button>
        
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <h2>Evaluación PhD</h2>
        <p>Sincronizado con MCP v5.5 e IRP.</p>
        <div style="background:#1a1a1a; padding:10px; border-radius:5px; font-size:10px; border:1px solid #333;">
            Actores: Jefe vs Operario<br>
            Capacidad: 50 Usuarios
        </div>
    </div>

    <script>
        // Lógica de Grabación Local
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('btnStart').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Sesion_PhD_Grabada.webm`;
                    a.click();
                    recordedChunks = [];
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display = 'block';
            } catch (err) { alert("Debe permitir captura de pantalla para grabar."); }
        };

        document.getElementById('btnStop').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
        };
    </script>
</body>
</html>
