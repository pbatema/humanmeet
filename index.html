<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Human Meet | PhD Work Psychology</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #0a0a0a; --accent: #00d2ff; --danger: #ff4b2b; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #video-container { width: 75%; background: #000; }
        #sidebar { width: 25%; border-left: 1px solid #333; padding: 20px; display: flex; flex-direction: column; background: #111; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .btn-rec { background: var(--danger); color: white; }
        .btn-stop { background: #444; color: white; display: none; }
        h2 { font-size: 16px; color: var(--accent); margin-top: 0; }
        p { font-size: 11px; color: #888; }
    </style>
</head>
<body>

    <div id="video-container"></div>

    <div id="sidebar">
        <h2>Control de Sesión</h2>
        <p>Grabe para analizar con Python (NLP/Whisper).</p>
        
        <button id="btnStart" class="btn btn-rec">🔴 Iniciar Grabación</button>
        <button id="btnStop" class="btn btn-stop">💾 Descargar Video</button>

        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        
        <h2>Evaluación PhD</h2>
        <p>Use sus archivos de Competencias (MCP) e Incidentes (PRIF) en paralelo.</p>
        <div style="background:#1a1a1a; padding:10px; border-radius:5px; border:1px solid #333; font-size:10px;">
            Estado: <b>Sincronizado</b><br>
            Capacidad: <b>50 Usuarios</b>
        </div>
    </div>

    <script>
        const domain = "meet.jit.si";
        const options = {
            roomName: "CoreHumanAI_Sesion_" + Math.random().toString(36).substring(7),
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#video-container'),
            lang: 'es',
            // ESTO HABILITA CÁMARA Y MICRO EN EL IFRAME
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false // Salta la pantalla de espera para evitar bloqueos
            },
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'chat', 'tileview', 'settings']
            }
        };

        // Inicializar la API
        const api = new JitsiMeetExternalAPI(domain, options);

        // Lógica de Grabación Local
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('btnStart').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Sesion_PhD_${new Date().getTime()}.webm`;
                    a.click();
                    recordedChunks = [];
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display = 'block';
            } catch (err) { alert("Error: Debe permitir captura de pantalla."); }
        };

        document.getElementById('btnStop').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
        };
    </script>
</body>
</html>
