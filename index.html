<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Core Human Meet | PhD Work Psychology</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #meet-frame { width: 75%; height: 100vh; border: none; }
        #sidebar { width: 25%; background: #111; padding: 20px; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-rec { background: #ff4b2b; color: white; }
        .btn-stop { background: #444; color: white; display: none; }
        .alert { font-size: 10px; color: #ffeb3b; border: 1px solid #ffeb3b; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <iframe id="meet-frame" src="https://meet.jit.si/CoreHumanAI_Sesion_PhD" allow="camera; microphone; display-capture; autoplay;"></iframe>

    <div id="sidebar">
        <h2>Control de Sesión</h2>
        <button id="btnStart" class="btn btn-rec">🔴 INICIAR GRABACIÓN</button>
        <button id="btnStop" class="btn btn-stop">💾 DESCARGAR VIDEO</button>
        
        <div class="alert">
            ⚠️ IMPORTANTE: Al elegir la pestaña, MARCA la casilla "Compartir audio de la pestaña" para capturar a los demás.
        </div>

        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <h2>Evaluación PhD</h2>
        <p style="font-size: 11px; color: #888;">Utilice sus matrices (MCP e IRP) en paralelo.</p>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('btnStart').onclick = async () => {
            try {
                // Capturamos pantalla con optimización para video/fluidez
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: 15 }, // Bajamos a 15fps (suficiente para clases y PPT)
                    audio: { echoCancellation: true } 
                });

                const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const context = new AudioContext();
                const destination = context.createMediaStreamDestination();
                
                if (screenStream.getAudioTracks().length > 0) {
                    context.createMediaStreamSource(screenStream).connect(destination);
                }
                context.createMediaStreamSource(micStream).connect(destination);

                const combinedStream = new MediaStream([
                    ...screenStream.getVideoTracks(),
                    ...destination.stream.getAudioTracks()
                ]);

                // AJUSTE DE PESO: Usamos un bitrate de 1Mbps (suficiente para 720p/1080p de lectura)
                const options = { 
                    mimeType: 'video/webm;codecs=h264,opus',
                    videoBitsPerSecond: 1000000 // 1 Mbps (reduce el peso un 70-80%)
                };

                mediaRecorder = new MediaRecorder(combinedStream, options);
                
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Diplomatura_Sesion_${new Date().toLocaleDateString()}.webm`;
                    a.click();
                    recordedChunks = [];
                    screenStream.getTracks().forEach(t => t.stop());
                    micStream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display = 'block';
            } catch (err) { alert("Error de permisos."); }
        };

        document.getElementById('btnStop').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
        };
    </script>
</body>
</html>
