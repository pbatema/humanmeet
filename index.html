<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diplomatura | Estudios Críticos</title>
    <style>
        /* Paleta de colores Github Dark optimizada */
        :root { 
            --bg: #0d1117; 
            --accent: #58a6ff; 
            --danger: #f85149; 
            --text: #c9d1d9; 
            --border: #30363d;
            --sidebar-bg: #161b22;
        }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #meet-frame { 
            width: 75%; 
            height: 100vh; 
            border: none; 
        }
        
        #sidebar { 
            width: 25%; 
            background: var(--sidebar-bg); 
            padding: 40px 30px; 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); 
        }
        
        .title-group {
            margin-bottom: 50px;
        }

        h1 { 
            font-size: 22px; 
            color: var(--accent); 
            margin: 0; 
            line-height: 1.4; 
            font-weight: 600; 
        }

        .controls {
            margin-top: 20px;
        }

        .btn { 
            width: 100%;
            padding: 18px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            transition: background 0.2s; 
            margin-bottom: 15px; 
            font-size: 13px; 
        }
        
        .btn-rec { 
            background: var(--danger); 
            color: white; 
        }
        
        .btn-rec:hover { 
            background: #da3633; 
        }
        
        .btn-stop { 
            background: var(--border); 
            color: var(--text); 
            display: none; 
        }
        
        .btn-stop:hover { 
            background: #363d44; 
        }
        
        .footer-info { 
            margin-top: auto; 
            font-size: 11px; 
            color: #484f58; 
            text-align: center; 
            border-top: 1px solid var(--border); 
            padding-top: 20px; 
        }
    </style>
</head>
<body>

    <iframe id="meet-frame" src="https://meet.jit.si/Diplomatura_Estudios_Criticos_LatAm" allow="camera; microphone; display-capture; autoplay;"></iframe>

    <div id="sidebar">
        <div class="title-group">
            <h1>Diplomatura "Estudios críticos de prácticas sociales en Latinoamerica y el Caribe"</h1>
        </div>
        
        <div class="controls">
            <button id="btnStart" class="btn btn-rec">🔴 Iniciar Grabación</button>
            <button id="btnStop" class="btn btn-stop">💾 Detener y Guardar</button>
        </div>

        <div class="footer-info">
            SISTEMA DE REGISTRO ACADÉMICO | 2026
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('btnStart').onclick = async () => {
            try {
                // Captura optimizada para bajo peso (15 fps)
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: 15 }, 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });

                // Captura del micrófono
                const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const context = new AudioContext();
                const destination = context.createMediaStreamDestination();
                
                if (screenStream.getAudioTracks().length > 0) {
                    context.createMediaStreamSource(screenStream).connect(destination);
                }
                context.createMediaStreamSource(micStream).connect(destination);

                const combinedStream = new MediaStream([
                    ...screenStream.getVideoTracks(),
                    ...destination.stream.getAudioTracks()
                ]);

                // Configuración de video liviano (H.264)
                const options = { 
                    mimeType: 'video/webm;codecs=h264,opus',
                    videoBitsPerSecond: 1000000 
                };

                mediaRecorder = new MediaRecorder(combinedStream, options);
                
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const now = new Date();
                    const dia = String(now.getDate()).padStart(2, '0');
                    const mes = String(now.getMonth() + 1).padStart(2, '0');
                    const anio = now.getFullYear();
                    
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    // Nombre del archivo: DiplomaturaDDMMAAAA
                    a.download = `Diplomatura${dia}${mes}${anio}.webm`;
                    a.click();
                    
                    recordedChunks = [];
                    screenStream.getTracks().forEach(t => t.stop());
                    micStream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display = 'block';
            } catch (err) { alert("Permisos de captura denegados."); }
        };

        document.getElementById('btnStop').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
        };
    </script>
</body>
</html>
