<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Human Meet | PhD Work Psychology</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #0a0a0a; --accent: #00d2ff; --danger: #ff4b2b; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #video-container { width: 75%; background: #000; }
        #sidebar { width: 25%; border-left: 1px solid #333; padding: 20px; display: flex; flex-direction: column; background: #111; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-bottom: 10px; }
        .btn-rec { background: var(--danger); color: white; }
        .btn-stop { background: #444; color: white; display: none; }
        .status-tag { font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        h2 { font-size: 16px; margin: 10px 0; color: var(--accent); }
        p { font-size: 12px; color: #888; line-height: 1.4; }
        .footer { margin-top: auto; font-size: 9px; color: #444; text-align: center; }
    </style>
</head>
<body>

    <div id="video-container"></div>

    <div id="sidebar">
        <div class="status-tag">SISTEMA INTEGRAL CONECTADO</div>
        <h2>Control de Sesión</h2>
        <p>Grabe la intervención para análisis posterior con Python (Whisper/NLP).</p>
        
        <button id="btnStart" class="btn btn-rec">🔴 Iniciar Grabación Local</button>
        <button id="btnStop" class="btn btn-stop">💾 Detener y Descargar</button>

        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        
        <h2>Evaluación PhD</h2>
        <p>Observe el comportamiento grupal y la resistencia al cambio en tiempo real.</p>
        <div style="background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; font-size:11px;">
            Sincronización con Dashboard: <b>Activa</b><br>
            Capacidad: <b>50 usuarios</b>
        </div>

        <div class="footer">ANALYTICS ENGINE | 2026</div>
    </div>

    <script>
        const domain = "meet.jit.si";
        const options = {
            roomName: "CoreHumanAI_Sesion_" + Math.random().toString(36).substring(7),
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#video-container'),
            lang: 'es',
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'chat', 'raisehand', 'tileview', 'settings']
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);

        let mediaRecorder;
        let recordedChunks = [];

        document.getElementById('btnStart').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Intervencion_${new Date().getTime()}.webm`;
                    a.click();
                    recordedChunks = [];
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display = 'block';
            } catch (err) { alert("Para grabar debes permitir la captura de pantalla."); }
        };

        document.getElementById('btnStop').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
        };
    </script>
</body>
</html>
